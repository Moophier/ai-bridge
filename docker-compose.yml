version: '3.8'

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///./ai_bridge.db
    depends_on:
      - redis

  worker:
    build: ./backend
    command: rq worker ai-tasks
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///./ai_bridge.db
    depends_on:
      - redis

  web:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
